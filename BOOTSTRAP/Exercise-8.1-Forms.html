<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8.1 - Bootstrap Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 20px;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="display-5">Exercise 8.1: Bootstrap Forms</h1>
        <p class="lead">Using form-control, form-check, and input-group components.</p>

        <h3 class="mt-5">Registration Form</h3>
        <div class="card">
            <div class="card-body">
                <form>
                    <!-- Text Input -->
                    <div class="mb-3">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" placeholder="Enter first name">
                    </div>

                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                    </div>

                    <!-- Password Input -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Enter password">
                    </div>

                    <!-- Select -->
                    <div class="mb-3">
                        <label for="country" class="form-label">Country</label>
                        <select class="form-select" id="country">
                            <option selected>Choose a country...</option>
                            <option>USA</option>
                            <option>Canada</option>
                            <option>UK</option>
                            <option>Australia</option>
                        </select>
                    </div>

                    <!-- Textarea -->
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="3" placeholder="Enter your message..."></textarea>
                    </div>

                    <!-- Checkboxes -->
                    <div class="mb-3">
                        <label class="form-label">Interests</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="interest1">
                            <label class="form-check-label" for="interest1">
                                Web Development
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="interest2">
                            <label class="form-check-label" for="interest2">
                                UI/UX Design
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="interest3">
                            <label class="form-check-label" for="interest3">
                                Mobile Development
                            </label>
                        </div>
                    </div>

                    <!-- Radio Buttons -->
                    <div class="mb-3">
                        <label class="form-label">Experience Level</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="level" id="beginner">
                            <label class="form-check-label" for="beginner">
                                Beginner
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="level" id="intermediate">
                            <label class="form-check-label" for="intermediate">
                                Intermediate
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="level" id="advanced">
                            <label class="form-check-label" for="advanced">
                                Advanced
                            </label>
                        </div>
                    </div>

                    <!-- Switch -->
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="agree">
                        <label class="form-check-label" for="agree">
                            I agree to the terms and conditions
                        </label>
                    </div>

                    <!-- Buttons -->
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </form>
            </div>
        </div>

        <h3 class="mt-5">Input Groups</h3>
        <div class="card">
            <div class="card-body">
                <!-- Input group with prefix -->
                <div class="mb-3">
                    <label class="form-label">Email with prefix</label>
                    <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" class="form-control" placeholder="username">
                    </div>
                </div>

                <!-- Input group with currency -->
                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" placeholder="0.00">
                        <span class="input-group-text">.00</span>
                    </div>
                </div>

                <!-- Input group with button -->
                <div class="mb-3">
                    <label class="form-label">Search</label>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Search...">
                        <button class="btn btn-outline-primary" type="button">Search</button>
                    </div>
                </div>

                <!-- Input group with dropdown -->
                <div class="mb-3">
                    <label class="form-label">Options</label>
                    <div class="input-group">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            Options
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Option 1</a></li>
                            <li><a class="dropdown-item" href="#">Option 2</a></li>
                        </ul>
                        <input type="text" class="form-control">
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mt-5">Form States</h3>
        <div class="card">
            <div class="card-body">
                <!-- Valid input -->
                <div class="mb-3">
                    <label for="valid" class="form-label">Valid Input</label>
                    <input type="text" class="form-control is-valid" id="valid" value="Valid input">
                    <div class="valid-feedback">
                        Looks good!
                    </div>
                </div>

                <!-- Invalid input -->
                <div class="mb-3">
                    <label for="invalid" class="form-label">Invalid Input</label>
                    <input type="text" class="form-control is-invalid" id="invalid" value="Invalid input">
                    <div class="invalid-feedback">
                        Please provide a valid input.
                    </div>
                </div>

                <!-- Disabled input -->
                <div class="mb-3">
                    <label for="disabled" class="form-label">Disabled Input</label>
                    <input type="text" class="form-control" id="disabled" disabled value="Disabled input">
                </div>

                <!-- Readonly input -->
                <div class="mb-3">
                    <label for="readonly" class="form-label">Readonly Input</label>
                    <input type="text" class="form-control" id="readonly" readonly value="Readonly input">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
